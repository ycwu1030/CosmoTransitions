# CosmoTransitions 数值参数配置文件
# 这是 TunnelingConfig 的完整默认值模板。
# 将此文件复制后按需修改，然后用 TunnelingConfig.from_file("your_config.toml") 加载。
#
# 用法：
#   from cosmoTransitions.config import TunnelingConfig
#   cfg = TunnelingConfig.from_file("my_config.toml")
#   model.findAllTransitions(tunneling_config=cfg)
#
# 特殊值说明：
#   "auto"  — 由程序根据物理量（如薄壁比 ε）自动推导
#   "none"  — 等价于 Python None，禁用该功能（TOML 无 null 类型，故以字符串代替）

[tunneling]

# ===========================================================================
# 1. 一维隧穿剖面参数 (findProfile)
# ===========================================================================

# 薄壁切断参数 thinCutoff。
# "auto" 时根据薄壁比 ε 自动选档：
#   ε > 0.1  → 0.01（厚壁默认）
#   ε > 1e-3 → 1e-3（中档）
#   ε ≤ 1e-3 → 1e-4（薄壁档）
# 直接提供浮点数可强制指定，例如 thinCutoff = 1e-4
thinCutoff = "auto"

# 积分起始半径（相对 rscale），"auto" 时随 ε 自动选档（规则与 thinCutoff 相同）。
rmin = "auto"

# ODE 积分精度（findProfile phitol）。
# 减小可提高剖面精度，但增加积分时间；对薄壁泡泡一般无需低于 1e-8。
phitol = 1e-6

# 场值二分搜索收敛精度（findProfile xtol）。
xtol = 1e-6

# 最大积分半径（相对 rscale）。
# 极厚壁泡泡的剖面在 r~rscale 处仍未衰减时可适当增大。
rmax = 1e4

# 输出剖面点数（用于插值 φ(r) 曲线）。
npoints = 500

# ===========================================================================
# 2. 势能样条预采样 (SplinePath / fullTunneling)
# ===========================================================================

# SplinePath 均匀采样点数。
#
# 100（默认）：在 [φ_sym, φ_broken] 上均匀取 100 点，用 PCHIP 样条逼近 V(x)。
#   对典型电弱尺度模型（势垒宽度占全场范围较大比例）效果良好，
#   可避免每步路径积分都调用完整的 Vtot()，加快计算。
#
# "none"（等价于 Python None）：不做预采样，SplinePath.V(x) 直接调用 Vtot。
#   对极度过冷模型（Tn/Tc ≲ 0.05）必须使用 "none"：
#   均匀 100 点的间距约为 w/99，而热势垒位于 φ~Tn ≪ w，
#   预采样会完全错过势垒，导致作用量计算出错或找不到核成温度。
#   supercooling_preset() 自动设置为 "none"。
V_spline_samples = 100
# V_spline_samples = "none"   # ← 取消注释以禁用预采样（极度过冷模型必选）

# fullTunneling 最大外层迭代数（路径形变 + 1D 隧穿交替的轮数）。
# 通常 10 次即收敛；极薄壁泡泡或复杂势面可能需要更多。
maxiter_fullTunneling = 20

# ===========================================================================
# 3. 路径形变参数 (pathDeformation.deformPath)
# ===========================================================================

# 收敛判据：路径上最大法向力 / 最大势能梯度 < 此值时停止形变。
# 减小可提高路径精度，但增加形变步数。
# 典型值 0.02；对作用量对路径敏感的过冷模型可减小至 0.005。
deform_fRatioConv = 0.02

# 路径形变最大迭代步数。超过此值时发出警告并返回当前最优路径。
deform_maxiter = 500

# ===========================================================================
# 4. 核成温度搜索参数 (tunnelFromPhase)
# ===========================================================================

# 核成判据，决定在什么条件下认为相变已发生：
#   "fixed_140"     — S3/T = 140（原始 CosmoTransitions 默认，与历史版本完全兼容）
#   "cosmological"  — S3/T = 4 ln(M_Pl/T)（辐射主导宇宙精确判据，T=100 GeV 时阈值≈143）
nuclCriterion = "fixed_140"

# 寻找核成温度 Tn 的温度精度（brentq xtol），单位与 T 一致（GeV）。
# 对 Tn ~ O(100) GeV 的典型电弱模型，1e-3 已足够精确；
# 对极度过冷模型（Tn ~ O(1e4) GeV），可放宽至 1.0 加快收敛。
Ttol = 1e-3

# 温度二分搜索最大迭代数。
maxiter_tunnel = 100

# 在给定温度 T 处精化真空位置时的场值精度（L-BFGS-B gtol）。
# 注意：这与 phitol（findProfile ODE 精度）是不同的参数。
# 过大会导致在错误场值处计算作用量；过小会增加优化迭代次数。
phitol_tunnel = 1e-8

# 多相方向夹角阈值（度）：若两目标相的场空间方向夹角小于此值，
# 只对较近的那个做隧穿计算，忽略较远的方向（避免重复计算）。
# 设为 0.0 可强制对所有相方向尝试隧穿。
overlapAngle = 45.0

# ===========================================================================
# 5. 温度扫描范围自动扩展
# ===========================================================================

# 是否允许向低温方向自动延伸 T 扫描区间。
# 开启后，若在初始扫描区间内未找到核成温度，程序会将下界乘以 0.1 继续搜索。
# 对极度过冷模型（Tn 远低于 Tc）强烈建议开启。
T_scan_extension = true

# 最多延伸次数（每次将扫描下界 × 0.1）。
# 3 次延伸可覆盖 Tn/Tc 低至约 0.001 的情形。
# supercooling_preset() 将此值设为 5。
T_scan_max_extend = 3

# ===========================================================================
# 6. 相追踪参数 (traceMultiMin)
# ===========================================================================

# 相追踪的初始温度步长，相对于 tHigh - tLow 的比值。
# 过大可能跳过窄温度宽度的相；过小会增加极值搜索次数。
# 对温度范围跨度超过 3 个量级的模型，建议减小至 1e-4。
dtstart = 1e-3

# 一个相追踪结束后，搜索下一个相时的温度跳跃，相对于 tHigh - tLow 的比值。
# 若某相的温度宽度小于 tjump × (tHigh - tLow)，该相可能被跳过。
tjump = 1e-3

# ===========================================================================
# 7. findProfile 自适应重试
# ===========================================================================

# 当 findProfile 出现步长崩溃（Rerr is not None）时，是否自动用
# 更严格的参数档位重试。
enable_profile_retry = true

# 最多重试次数。
max_profile_retries = 3

# ===========================================================================
# 8. 数值微分
# ===========================================================================

# 是否在 gradV / d2V 中使用自适应步长有限差分。
# 开启后对陡峭或高曲率势面更鲁棒，但比固定步长稍慢。
use_adaptive_grad = true

# ===========================================================================
# 9. 日志级别
# ===========================================================================

# 启用 cosmoTransitions 包级日志的级别。
# 取值（整数）：10 = DEBUG, 20 = INFO, 30 = WARNING, 40 = ERROR
# "none" 表示不修改任何日志配置（默认，等价于 Python None）。
# 等价于在代码中调用 cosmoTransitions.enable_logging(level)。
log_level = "none"
# log_level = 20   # ← 取消注释以启用 INFO 级别日志
