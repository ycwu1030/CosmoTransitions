# CosmoTransitions numerical configuration template
# This is the full default template for TunnelingConfig.
# Copy this file, edit as needed, and load with
# `TunnelingConfig.from_file("your_config.toml")`.
#
# Usage:
#   from cosmoTransitions.config import TunnelingConfig
#   cfg = TunnelingConfig.from_file("my_config.toml")
#   model.findAllTransitions(tunneling_config=cfg)
#
# Special sentinel values:
#   "auto"  — deduced automatically from physical diagnostics (e.g. thin-wall ratio \epsilon)
#   "none"  — equivalent to Python None (disables the feature); used because TOML has no null

[tunneling]

# ===========================================================================
# 1. 1D instanton/profile parameters (findProfile)
# ===========================================================================

# Thin-wall cutoff parameter `thinCutoff`.
# When set to "auto", the code selects a recommended value based on the thin-wall
# ratio \epsilon:
#   \epsilon > 0.1  → 1e-2  (thick-wall default)
#   \epsilon > 1e-3 → 1e-3  (medium)
#   \epsilon ≤ 1e-3 → 1e-4  (thin-wall)
# You may provide a float to override, e.g. thinCutoff = 1e-4
thinCutoff = "auto"

# Starting radius for ODE integration (relative to rscale). "auto" selects a
# recommended value following the same tiers as `thinCutoff`.
rmin = "auto"

# ODE integrator tolerance for findProfile (`phitol`). Decrease for higher
# accuracy at the cost of longer runtime. For thin-wall bubbles `1e-8` is usually
# unnecessary; typical default is 1e-6.
phitol = 1e-6

# Field-value bracketing tolerance when searching for the shooting solution
# (findProfile `xtol`).
xtol = 1e-6

# Maximum integration radius (relative to rscale). Increase for extremely
# thick-wall profiles that have not decayed by r ~ rscale.
rmax = 1e4

# Number of profile points to output (used for interpolating \phi(r)).
npoints = 500

# ===========================================================================
# 2. Potential spline pre-sampling (SplinePath / fullTunneling)
# ===========================================================================

# Number of uniform samples for SplinePath interpolation of V(x).
#
# 100 (default): sample 100 points on [\phi_sym, \phi_broken] and build a
# PCHIP spline for V(x). This reduces calls to full Vtot() while giving good
# accuracy for typical electroweak-scale models.
#
# "none" (equivalent to Python None): disable pre-sampling and call Vtot()
# directly. For extreme supercooling (T_n/T_c ≲ 0.05) pre-sampling can miss a
# narrow thermal barrier located near \phi ~ T_n ≪ width; in such cases use
# V_spline_samples = "none". `supercooling_preset()` sets this to "none".
V_spline_samples = 100
# V_spline_samples = "none"   # ← uncomment to disable pre-sampling (required for extreme supercooling)

# Maximum outer iterations for fullTunneling (alternating path-deform + 1D tunneling).
# Typically 10 iterations suffice; complex potentials may need more.
maxiter_fullTunneling = 20

# ===========================================================================
# 3. Path deformation parameters (pathDeformation.deformPath)
# ===========================================================================

# Convergence criterion: when max(normal_force)/max(|gradV|) < deform_fRatioConv
# deformation stops. Smaller values increase path accuracy but require more
# deformation steps. Typical value: 0.02; use ~0.005 for supercooling-sensitive cases.
deform_fRatioConv = 0.02

# Maximum deformation iterations. A warning is issued if exceeded and the
# current best path is returned.
deform_maxiter = 500

# ===========================================================================
# 4. Nucleation search parameters (tunnelFromPhase)
# ===========================================================================

# Nucleation criterion determining when a transition is considered to have occurred:
#   "fixed_140"     — S3/T = 140 (historical CosmoTransitions default)
#   "cosmological"  — S3/T = 4 ln(M_Pl / T) (radiation-dominated cosmological criterion)
# The latter gives a threshold ≈ 143 at T = 100 GeV.
nuclCriterion = "fixed_140"

# Temperature tolerance for finding T_n (brentq `xtol`), units are GeV.
# For T_n ~ O(100) GeV, 1e-3 is sufficient; for extreme cases relax to 1.0 to speed up.
Ttol = 1e-3

# Maximum iterations for the temperature bracketing root-finder.
maxiter_tunnel = 100

# Field-value optimizer tolerance when refining the true vacuum at a given T
# (L-BFGS-B `gtol`). This differs from `phitol` used by the ODE solver.
# Too large leads to action computed at an inaccurate field value; too small increases runtime.
phitol_tunnel = 1e-8

# Angle threshold (degrees) between phase directions in field-space: when the
# angle between two candidate target vacua is below this value, only the nearer
# direction is attempted for tunneling to avoid duplicated work. Set to 0.0 to
# force attempts for all directions.
overlapAngle = 45.0

# ===========================================================================
# 5. Temperature scan auto-extension
# ===========================================================================

# Whether to allow automatic extension of the lower bound when scanning for T_n.
# If enabled, when no nucleation is found in the initial scan, the lower bound
# is multiplied by 0.1 and the scan repeats. Recommended for extreme supercooling.
T_scan_extension = true

# Maximum number of extensions (each multiplies the lower bound by 0.1).
# A setting of 3 covers T_n/T_c down to ~0.001; `supercooling_preset()` sets this to 5.
T_scan_max_extend = 3

# ===========================================================================
# 6. Phase-tracing parameters (traceMultiMin)
# ===========================================================================

# Initial temperature step for phase tracing, relative to (tHigh - tLow).
# Large values may skip narrow phases; small values increase extremum searches.
dtstart = 1e-3

# Temperature jump when searching for the next phase after finishing one phase.
# If a phase's width is less than tjump*(tHigh - tLow), it may be skipped.
tjump = 1e-3

# ===========================================================================
# 7. findProfile adaptive retries
# ===========================================================================

# When findProfile fails due to step-size crashes (Rerr is not None), retry with
# a stricter parameter tier automatically.
enable_profile_retry = true

# Maximum retry attempts.
max_profile_retries = 3

# ===========================================================================
# 8. Numerical differentiation
# ===========================================================================

# Use adaptive-step finite differences in gradV / d2V. More robust on steep or
# high-curvature potentials at modest extra cost compared to fixed-step.
use_adaptive_grad = true

# ===========================================================================
# 9. Logging level
# ===========================================================================

# Package-level logging for cosmoTransitions. Integer values: 10=DEBUG, 20=INFO,
# 30=WARNING, 40=ERROR. "none" leaves logging untouched (equivalent to Python None).
# Equivalent to calling cosmoTransitions.enable_logging(level).
log_level = "none"
# log_level = 20   # ← uncomment to enable INFO-level logs
