[pytest]
testpaths = tests
addopts = -v --tb=short
markers =
    slow: marks tests as slow, >10s (deselect with -m "not slow")
    benchmark: marks end-to-end benchmark tests
    xfail_baseline: known pre-existing bug, expected to fail until fixed in a later phase
filterwarnings =
    ignore::SyntaxWarning
    ignore::scipy.integrate.IntegrationWarning
    ignore::DeprecationWarning
